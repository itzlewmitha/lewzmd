<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LEWZ MD | Spider-Bot Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── ROOT VARIABLES (Spider-Verse) ── */
        :root {
            --spider-red: #e62429;
            --spider-dark: #0a0a1a;
            --spider-blue: #1a1a3e;
            --spider-web: rgba(230, 36, 41, 0.15);
            --spider-glow: rgba(230, 36, 41, 0.6);
            --card-bg: rgba(26, 26, 62, 0.85);
            --border-glow: #e62429;
            --text-primary: #f0f0ff;
            --text-muted: #a0a0c0;
            --font-display: 'Bangers', cursive;
            --font-body: 'Rajdhani', sans-serif;
        }

        /* ── GLOBAL ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--spider-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ── SPIDER-WEB OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(230, 36, 41, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(230, 36, 41, 0.06) 0%, transparent 50%),
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 40px,
                    rgba(230, 36, 41, 0.03) 40px,
                    rgba(230, 36, 41, 0.03) 41px),
                repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 40px,
                    rgba(230, 36, 41, 0.03) 40px,
                    rgba(230, 36, 41, 0.03) 41px);
            pointer-events: none;
            z-index: 0;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--spider-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--spider-red);
            border-radius: 10px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 8px var(--spider-glow), 0 0 20px rgba(230, 36, 41, 0.3);
            }
            50% {
                box-shadow: 0 0 20px var(--spider-glow), 0 0 50px rgba(230, 36, 41, 0.5);
            }
        }

        @keyframes webSwing {
            0% {
                transform: rotate(-2deg) scale(1);
            }
            50% {
                transform: rotate(2deg) scale(1.02);
            }
            100% {
                transform: rotate(-2deg) scale(1);
            }
        }

        @keyframes spideySense {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @keyframes webPattern {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        @keyframes floatPulse {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        /* ── UTILITY ── */
        .animate-fade-up {
            animation: fadeInUp 0.7s ease forwards;
        }
        .animate-fade-down {
            animation: fadeInDown 0.6s ease forwards;
        }
        .animate-pulse-glow {
            animation: pulseGlow 2.5s ease-in-out infinite;
        }
        .animate-web-swing {
            animation: webSwing 4s ease-in-out infinite;
        }
        .animate-spidey {
            animation: spideySense 2s ease-in-out infinite;
        }
        .animate-float {
            animation: floatPulse 3s ease-in-out infinite;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--spider-red);
            padding: 12px 0;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(230, 36, 41, 0.15);
        }
        .navbar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--spider-red), transparent);
            animation: shimmer 3s linear infinite;
            background-size: 200% 100%;
        }
        .navbar-brand {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--spider-red) !important;
            text-shadow: 0 0 20px rgba(230, 36, 41, 0.4);
            transition: 0.3s;
        }
        .navbar-brand i {
            margin-right: 10px;
            animation: webSwing 3s ease-in-out infinite;
        }
        .navbar-brand:hover {
            transform: scale(1.05);
            text-shadow: 0 0 40px rgba(230, 36, 41, 0.7);
        }

        /* ── STATS CARDS ── */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        .stats-card {
            flex: 1;
            min-width: 160px;
            background: linear-gradient(145deg, rgba(26, 26, 62, 0.9), rgba(10, 10, 26, 0.95));
            border: 1.5px solid var(--spider-red);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            backdrop-filter: blur(4px);
        }
        .stats-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, var(--spider-red), transparent 40%, transparent 60%, var(--spider-red));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.4;
            transition: 0.5s;
        }
        .stats-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ff4757;
            box-shadow: 0 12px 50px rgba(230, 36, 41, 0.25);
        }
        .stats-card:hover::before {
            opacity: 1;
        }
        .stats-card h3 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            color: var(--spider-red);
            text-shadow: 0 0 30px rgba(230, 36, 41, 0.3);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .stats-card p {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }
        .stats-card .spider-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 4rem;
            opacity: 0.06;
            transform: rotate(20deg);
        }

        /* ── POST CARDS ── */
        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(230, 36, 41, 0.25);
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 24px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 0% 0%, rgba(230, 36, 41, 0.05), transparent 60%);
            pointer-events: none;
        }
        .post-card:hover {
            transform: translateY(-6px);
            border-color: var(--spider-red);
            box-shadow: 0 8px 40px rgba(230, 36, 41, 0.15);
        }
        .post-card h5 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 16px;
        }
        .post-card h5 i {
            color: var(--spider-red);
            margin-right: 10px;
        }

        /* ── FORM CONTROLS ── */
        .form-control {
            background: rgba(10, 10, 26, 0.7);
            border: 1.5px solid rgba(230, 36, 41, 0.3);
            border-radius: 12px;
            color: #fff;
            padding: 12px 18px;
            font-family: var(--font-body);
            font-weight: 600;
            transition: 0.3s;
        }
        .form-control:focus {
            background: rgba(10, 10, 26, 0.9);
            border-color: var(--spider-red);
            box-shadow: 0 0 25px rgba(230, 36, 41, 0.15);
            color: #fff;
        }
        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        .input-group .form-control {
            border-radius: 12px 0 0 12px;
        }
        .input-group .btn {
            border-radius: 0 12px 12px 0;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--spider-red), #c0392b);
            border: none;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 12px;
            padding: 12px 28px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            color: #fff;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.15) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 35px rgba(230, 36, 41, 0.4);
            color: #fff;
        }
        .btn-primary:hover::before {
            transform: translateX(100%);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 10px 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            color: #fff;
        }
        .btn-danger:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.4);
            color: #fff;
        }

        /* ── STATUS BADGE ── */
        .status-badge {
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: inline-block;
            transition: 0.3s;
        }
        .connected {
            background: #27ae60;
            color: #fff;
            box-shadow: 0 0 25px rgba(39, 174, 96, 0.4);
        }
        .disconnected {
            background: #e74c3c;
            color: #fff;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.3);
        }

        /* ── CONSOLE ── */
        .console-body {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 14px;
            height: 250px;
            overflow-y: auto;
            padding: 16px 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #10b981;
            border: 1px solid rgba(230, 36, 41, 0.2);
            backdrop-filter: blur(4px);
            position: relative;
        }
        .console-body::before {
            content: '🕸️  CONSOLE • SPIDER-VERSE';
            position: absolute;
            top: 6px;
            right: 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-muted);
            opacity: 0.3;
        }
        .console-body div {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .console-body .log-time {
            color: var(--text-muted);
            opacity: 0.5;
            margin-right: 10px;
        }
        .console-body .log-msg {
            color: #b0e0d0;
        }

        /* ── PAIRING RESULT ── */
        #pairingResult {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 2px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-top: 12px;
        }

        /* ── PROGRESS BAR (WEB-SLINGER) ── */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            margin-top: 18px;
            padding: 3px;
            border: 1px solid rgba(230, 36, 41, 0.2);
            display: none;
            position: relative;
            overflow: hidden;
        }
        .progress-container::after {
            content: '🕸️';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background: linear-gradient(90deg, var(--spider-red), #ff6b81, var(--spider-red));
            background-size: 200% 100%;
            border-radius: 30px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
        }
        .loading-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .loading-text i {
            margin-right: 6px;
            color: var(--spider-red);
        }

        /* ── HIDDEN ── */
        .hidden {
            display: none !important;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .stats-container {
                flex-direction: column;
            }
            .navbar-brand {
                font-size: 1.6rem;
            }
            .post-card {
                padding: 18px 16px;
            }
            #pairingResult {
                font-size: 1.4rem;
            }
            .stats-card h3 {
                font-size: 2.2rem;
            }
        }

        /* ── SPIDER LOGO FLOATING ── */
        .spider-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 3rem;
            color: var(--spider-red);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            animation: floatPulse 4s ease-in-out infinite;
        }

        /* ── BOT NAME TAG ── */
        .bot-tag {
            background: rgba(230, 36, 41, 0.15);
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(230, 36, 41, 0.2);
            color: var(--text-primary);
        }
        .bot-tag i {
            color: var(--spider-red);
            margin-right: 6px;
        }

        /* extra glow for active elements */
        .glow-active {
            animation: pulseGlow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <!-- ─── FLOATING SPIDER ─── -->
    <div class="spider-float"><i class="fas fa-spider"></i></div>

    <!-- ─── NAVBAR ─── -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-spider"></i> LEWZ MD
                <span style="font-family:var(--font-body);font-size:0.7rem;color:var(--text-muted);letter-spacing:3px;margin-left:10px;font-weight:400;">• SPIDER-BOT</span>
            </a>
        </div>
    </nav>

    <!-- ─── MAIN ─── -->
    <div class="container mt-4" style="position:relative;z-index:2;">

        <!-- STATS -->
        <div class="stats-container animate-fade-up">
            <div class="stats-card">
                <span class="spider-icon"><i class="fas fa-spider"></i></span>
                <h3 id="totalUsers">0</h3>
                <p><i class="fas fa-users me-1" style="color:var(--spider-red);"></i> TOTAL USERS</p>
            </div>
            <div class="stats-card">
                <span class="spider-icon"><i class="fas fa-bolt"></i></span>
                <h3 id="totalActive">0</h3>
                <p><i class="fas fa-circle me-1" style="color:#27ae60;"></i> BOT ACTIVE</p>
            </div>
        </div>

        <!-- SETUP -->
        <div id="setupSection" class="animate-fade-up" style="animation-delay:0.1s;">
            <div class="post-card">
                <h5><i class="fas fa-plus-circle"></i> CREATE BOT</h5>
                <div class="input-group mb-3">
                    <input type="text" id="userIdInput" class="form-control" placeholder="Enter Bot Name (e.g., SpideyBot)" />
                    <button class="btn btn-primary" onclick="selectUser()">
                        <i class="fas fa-spider me-2"></i> CREATE
                    </button>
                </div>
                <small style="color:var(--text-muted);"><i class="fas fa-info-circle me-1"></i> Choose a unique name for your Spider-Bot.</small>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="userDashboard" class="hidden animate-fade-up">

            <!-- STAGE 1 : PAIRING -->
            <div id="stage1">
                <div class="post-card animate-web-swing">
                    <h5><i class="fas fa-link"></i> PAIRING CODE</h5>
                    <div class="mb-3">
                        <label class="form-label" style="font-weight:600;color:var(--text-muted);">
                            <i class="fas fa-phone me-1" style="color:var(--spider-red);"></i> WhatsApp Number (with country code)
                        </label>
                        <input type="tel" class="form-control" id="pairNumber" placeholder="923001234567" />
                    </div>
                    <button class="btn btn-primary w-100" id="pairBtn">
                        <i class="fas fa-spider me-2"></i> GENERATE CODE
                    </button>

                    <!-- Progress -->
                    <div id="progressContainer" class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                        <div class="loading-text">
                            <i class="fas fa-circle-notch fa-spin"></i> Web-slinging connection...
                        </div>
                    </div>

                    <div id="pairingResult" class="mt-3 text-center"></div>
                </div>
            </div>

            <!-- STAGE 2 : CONNECTED -->
            <div id="stage2" class="hidden">
                <div class="post-card d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <div>
                        <span id="connectionStatus" class="status-badge disconnected">DISCONNECTED</span>
                        <span class="bot-tag ms-2" id="activeBotName">
                            <i class="fas fa-spider"></i> Bot: —
                        </span>
                    </div>
                    <button class="btn btn-danger btn-sm" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-1"></i> LOGOUT
                    </button>
                </div>

                <div class="post-card">
                    <h5><i class="fas fa-terminal"></i> LIVE CONSOLE</h5>
                    <div class="console-body" id="console">
                        <div style="color:var(--text-muted);opacity:0.5;font-size:12px;">
                            <i class="fas fa-spider me-1"></i> Waiting for activity...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── SCRIPTS ─── -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js">
    </script>
    <script>
        const socket = io();
        let currentUserId = null;
        let isPairing = false;

        // ── SELECT / CREATE ──
        function selectUser() {
            const userId = document.getElementById('userIdInput').value.trim();
            if (!userId) return alert('🕸️ Enter a bot name!');
            currentUserId = userId;
            socket.emit('set-user', userId);

            document.getElementById('activeBotName').innerHTML = `<i class="fas fa-spider"></i> Bot: ${userId}`;
            document.getElementById('userDashboard').classList.remove('hidden');
            document.getElementById('stage1').classList.remove('hidden');
            document.getElementById('stage2').classList.add('hidden');

            // re-trigger animation
            const el = document.getElementById('userDashboard');
            el.style.animation = 'none';
            requestAnimationFrame(() => {
                el.style.animation = 'fadeInUp 0.7s ease forwards';
            });
        }

        // ── SOCKET EVENTS ──
        socket.on('total-active', (count) => {
            document.getElementById('totalActive').innerText = count;
        });

        socket.on('total-users', (count) => {
            document.getElementById('totalUsers').innerText = count;
        });

        socket.on('pairing-code', (code) => {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('pairingResult').innerHTML = `
                <i class="fas fa-spider me-2" style="color:#ffd700;"></i> YOUR CODE: <span style="color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,0.4);">${code}</span>
            `;
            isPairing = false;
            document.getElementById('pairBtn').disabled = false;
        });

        socket.on('console', (log) => {
            const consoleDiv = document.getElementById('console');
            const entry = document.createElement('div');
            const time = log.timestamp || new Date().toLocaleTimeString();
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-msg">${log.message}</span>
            `;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        });

        socket.on('connection-status', (status) => {
            const badge = document.getElementById('connectionStatus');
            if (status.connected) {
                badge.className = 'status-badge connected';
                badge.innerHTML = '<i class="fas fa-circle me-1" style="font-size:8px;"></i> CONNECTED';
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage2').classList.remove('hidden');
                document.getElementById('progressContainer').style.display = 'none';
                // re-trigger animation on stage2
                const el = document.getElementById('stage2');
                el.style.animation = 'none';
                requestAnimationFrame(() => {
                    el.style.animation = 'fadeInUp 0.6s ease forwards';
                });
            } else {
                badge.className = 'status-badge disconnected';
                badge.innerHTML = '<i class="fas fa-circle me-1" style="font-size:8px;"></i> DISCONNECTED';
            }
        });

        // ── PAIR BUTTON ──
        document.getElementById('pairBtn').onclick = () => {
            if (isPairing) return;
            const number = document.getElementById('pairNumber').value.trim();
            if (!number) return alert('🕸️ Enter your WhatsApp number!');

            isPairing = true;
            document.getElementById('pairBtn').disabled = true;
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const pairingResult = document.getElementById('pairingResult');

            pairingResult.innerHTML = '';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += 2 + Math.random() * 3;
                    if (width > 90) width = 90;
                    progressBar.style.width = width + '%';
                }
            }, 120);

            socket.emit('pair-request', { userId: currentUserId, number });

            // safety timeout
            setTimeout(() => {
                isPairing = false;
                document.getElementById('pairBtn').disabled = false;
                clearInterval(interval);
                if (document.getElementById('progressContainer').style.display !== 'none') {
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        pairingResult.innerHTML =
                            '<span style="color:#e74c3c;font-size:1rem;"><i class="fas fa-exclamation-triangle me-2"></i>Timeout — try again.</span>';
                    }, 800);
                }
            }, 15000);
        };

        // ── LOGOUT ──
        document.getElementById('logoutBtn').onclick = () => {
            if (currentUserId) {
                socket.emit('logout', currentUserId);
                document.getElementById('stage2').classList.add('hidden');
                document.getElementById('stage1').classList.remove('hidden');
                document.getElementById('connectionStatus').className = 'status-badge disconnected';
                document.getElementById('connectionStatus').innerHTML =
                    '<i class="fas fa-circle me-1" style="font-size:8px;"></i> DISCONNECTED';
                document.getElementById('pairingResult').innerHTML = '';
                document.getElementById('console').innerHTML = `
                    <div style="color:var(--text-muted);opacity:0.5;font-size:12px;">
                        <i class="fas fa-spider me-1"></i> Console cleared.
                    </div>`;
            }
        };

        // ── ENTER KEY ──
        document.getElementById('userIdInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') selectUser();
        });
        document.getElementById('pairNumber').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('pairBtn').click();
        });

        // small initial console hint
        setTimeout(() => {
            const consoleDiv = document.getElementById('console');
            if (consoleDiv.children.length <= 1) {
                consoleDiv.innerHTML = `
                    <div style="color:var(--text-muted);opacity:0.4;font-size:12px;">
                        <i class="fas fa-spider me-1"></i> Ready — connect your bot to see logs.
                    </div>`;
            }
        }, 500);
    </script>

</body>
</html>
